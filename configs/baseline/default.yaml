preprocessing:
  lowercase: true
  remove_punct: true
  remove_urls: true
  stem: true

tfidf:
  max_features: 10000
  ngram_range: [1, 2]
  min_df: 2
  max_df: 0.95

logreg:
  C: 1.0
  max_iter: 1000
  solver: "lbfgs"
  multi_class: "multinomial"

model:
  save_dir: "models/baseline"

logging:
  mlflow_uri: "http://127.0.0.1:8080"
  experiment_name: "baseline_experiment"
  run_name: "tfidf_logreg"
